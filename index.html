<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Un beso? 💋</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --rosa-fondo: #ffe1ea;
    --rosa-fondo-2: #ffc9dc;
    --frambuesa: #d6336c;
    --frambuesa-oscuro: #a61e4d;
    --lavanda: #b197fc;
    --crema: #fff6f8;
    --sombra: rgba(166, 30, 77, 0.25);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0;
    padding:0;
    width:100%;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x:hidden;
    overflow-y:auto;
    font-family: 'Quicksand', sans-serif;
    background: radial-gradient(circle at 20% 20%, var(--rosa-fondo-2), var(--rosa-fondo) 60%);
  }

  .cielo{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
  }

  .corazon-flotante{
    position:absolute;
    bottom:-10%;
    font-size: 24px;
    opacity:0.55;
    animation: flotar linear infinite;
    color: var(--frambuesa);
  }

  @keyframes flotar{
    0%{ transform: translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.6; }
    100%{ transform: translateY(-115vh) translateX(var(--drift, 20px)) rotate(25deg); opacity:0; }
  }

  .escenario{
    position:relative;
    z-index:1;
    width:100%;
    min-height: 100vh;
    min-height: 100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 24px;
  }

  .tarjeta{
    background: var(--crema);
    border-radius: 32px;
    padding: 48px 40px 56px;
    max-width: 460px;
    width:100%;
    text-align:center;
    box-shadow: 0 24px 60px var(--sombra);
    border: 3px solid #ffffff;
    position:relative;
  }

  .ceja{
    font-family:'Baloo 2', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--lavanda);
    font-weight: 700;
    margin-bottom: 6px;
  }

  h1{
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 6vw, 38px);
    color: var(--frambuesa-oscuro);
    margin: 0 0 8px;
    line-height: 1.15;
  }

  .subtitulo{
    color: #a5476b;
    font-weight: 600;
    margin: 0 0 36px;
    font-size: 16px;
  }

  .fila-botones{
    position: relative;
    display:flex;
    gap: 22px;
    justify-content:center;
    align-items:center;
    min-height: 70px;
  }

  button{
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 20px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    padding: 16px 34px;
    transition: transform 0.15s ease;
  }

  #btn-si{
    background: var(--frambuesa);
    color: white;
    box-shadow: 0 10px 24px var(--sombra);
  }
  #btn-si:hover{ transform: scale(1.06); }
  #btn-si:active{ transform: scale(0.96); }

  #btn-no{
    background: white;
    color: var(--frambuesa-oscuro);
    border: 2px solid #ffd1e0;
    position: relative;
    z-index: 5;
  }

  /* Cuando el no se vuelve "escurridizo" se posiciona respecto al escenario */
  body.no-libre #btn-no{
    position: fixed;
    z-index: 50;
  }

  .contador{
    margin-top: 22px;
    font-size: 13px;
    color: #c98aa6;
    font-weight: 600;
    min-height: 18px;
  }

  /* Pantalla de resultado */
  .resultado{
    display:none;
    text-align:center;
  }

  .resultado.activo{
    display:block;
    animation: aparecer 0.5s ease;
  }

  @keyframes aparecer{
    from{ opacity:0; transform: scale(0.85) translateY(10px); }
    to{ opacity:1; transform: scale(1) translateY(0); }
  }

  .sticker{
    width: 190px;
    max-width: 70%;
    margin: 0 auto 18px;
    position: relative;
  }

  .sticker img{
    width:100%;
    height:auto;
    display:block;
    border-radius: 20px;
    box-shadow: 0 14px 30px var(--sombra);
    animation: bailecito 1.6s ease-in-out infinite;
  }

  @keyframes bailecito{
    0%, 100%{ transform: rotate(-4deg) scale(1); }
    50%{ transform: rotate(4deg) scale(1.04); }
  }

  .mensaje-final{
    font-family:'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 26px;
    color: var(--frambuesa-oscuro);
    margin: 6px 0 6px;
  }

  .mensaje-final-sub{
    color: #a5476b;
    font-weight: 600;
    font-size: 15px;
    margin: 0;
  }

  .oculto{ display:none !important; }

  .confeti{
    position: fixed;
    top: -20px;
    font-size: 20px;
    pointer-events:none;
    z-index: 30;
    animation: caer linear forwards;
  }

  @media (max-width: 380px){
    .tarjeta{ padding: 36px 24px 40px; border-radius: 26px; }
    .fila-botones{ gap: 14px; flex-wrap: wrap; }
    button{ font-size: 17px; padding: 14px 24px; }
    .sticker{ width: 150px; }
  }

  @media (max-height: 640px){
    .tarjeta{ padding: 28px 24px 32px; }
    .subtitulo{ margin-bottom: 22px; }
    .sticker{ width: 140px; }
  }

  @keyframes caer{
    to{ transform: translateY(110vh) rotate(360deg); opacity: 0.2; }
  }

</style>
</head>
<body>

<div class="cielo" id="cielo"></div>

<div class="escenario">
  <div class="tarjeta">

    <div id="pregunta">
      <div class="ceja">Mensaje importante</div>

      <p class="subtitulo">Es una pregunta con truco, pero tú puedes con esto.</p>

        <button id="btn-no">No</button>

    "Ok ya, ríndete y dale al Sí 😘"
  ];

  function moverBotonNo(){
    document.body.classList.add('no-libre');

    const margen = 20;
    const anchoBoton = btnNo.offsetWidth || 110;
    const altoBoton = btnNo.offsetHeight || 56;

    const maxX = window.innerWidth - anchoBoton - margen;
    const maxY = window.innerHeight - altoBoton - margen;

    const nuevaX = Math.random() * (maxX - margen) + margen;
    const nuevaY = Math.random() * (maxY - margen) + margen;

    btnNo.style.left = nuevaX + 'px';
    btnNo.style.top = nuevaY + 'px';
  }

  function reaccionarIntento(){
    intentos++;
    const frase = frasesIntento[Math.min(intentos - 1, frasesIntento.length - 1)];
    contador.textContent = frase;
    moverBotonNo();
  }

  // Se mueve al pasar el mouse cerca (hover) y también al hacer click/touch, por si acaso
  btnNo.addEventListener('mouseenter', reaccionarIntento);
  btnNo.addEventListener('click', (e) => {
    e.preventDefault();
    reaccionarIntento();
  });
  btnNo.addEventListener('touchstart', (e) => {
    e.preventDefault();
    reaccionarIntento();
  });

  btnSi.addEventListener('click', () => {
    pregunta.style.display = 'none';
    resultado.classList.add('activo');
    document.body.classList.remove('no-libre');
    lanzarConfeti();
  });

  function lanzarConfeti(){
    const emojis = ['💖','💕','💋','✨','💗'];
    for(let i = 0; i < 28; i++){
      setTimeout(() => {
        const pieza = document.createElement('div');
        pieza.className = 'confeti';
        pieza.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        pieza.style.left = Math.random() * 100 + 'vw';
        pieza.style.animationDuration = (2 + Math.random() * 2) + 's';
        pieza.style.fontSize = (16 + Math.random() * 14) + 'px';
        cielo.appendChild(pieza);
        setTimeout(() => pieza.remove(), 4500);
      }, i * 80);
    }
  }

  // Corazones flotando de fondo, sutiles, todo el tiempo
  function crearCorazonFondo(){
    const c = document.createElement('div');
    c.className = 'corazon-flotante';
    c.textContent = ['💗','💕','💓'][Math.floor(Math.random()*3)];
    c.style.left = Math.random() * 100 + 'vw';
    c.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
    c.style.animationDuration = (7 + Math.random() * 6) + 's';
    cielo.appendChild(c);
    setTimeout(() => c.remove(), 14000);
  }
  setInterval(crearCorazonFondo, 900);
</script>

</body>
</html>
